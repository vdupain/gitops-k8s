---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: falco
      version: 4.12.0
      sourceRef:
        kind: HelmRepository
        name: falco
        namespace: flux-system
      interval: 12h
  releaseName: falco

  valuesFrom:
  - kind: ConfigMap
    name: falco-values
    valuesKey: values.yaml
