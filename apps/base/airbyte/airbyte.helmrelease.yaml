---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airbyte
  namespace: airbyte
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: airbyte
      version: 1.2.0-rc-0f9cffefa08
      sourceRef:
        kind: HelmRepository
        name: airbyte
        namespace: flux-system
      interval: 12h
  releaseName: airbyte

  valuesFrom:
  - kind: ConfigMap
    name: airbyte-values
    valuesKey: values.yaml
