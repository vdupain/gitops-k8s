---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: novnc
  namespace: novnc
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: novnc
      version: 1.0.0
      sourceRef:
        kind: HelmRepository
        name: novnc
        namespace: flux-system
      interval: 12h

  values:
    env:
      REMOTE_HOST: "kubedoom.kubedoom"
      REMOTE_PORT: "5900"
