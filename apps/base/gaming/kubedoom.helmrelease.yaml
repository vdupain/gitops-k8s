---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubedoom
  namespace: kubedoom
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: kubedoom
      version: 1.0.3
      sourceRef:
        kind: HelmRepository
        name: kubedoom
        namespace: flux-system
      interval: 12h

  values:
    kubedoom:
      mode: "pods"
      namespace: "kubedoom"
