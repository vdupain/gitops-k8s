---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: n8n
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: n8n
      version: 1.16.18
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: flux-system
      interval: 12h

  values:
    db:
      type: postgresdb

    externalPostgresql:
      host: "pg-cluster-n8n-rw.n8n.svc.cluster.local"
      username: "n8n"
      password: "n8n"
      database: "n8n"

    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: le-prod
        gethomepage.dev/enabled: "true"
        gethomepage.dev/name: "n8n"
        gethomepage.dev/icon: "si-n8n"
        gethomepage.dev/group: "Tooling"
      hosts:
        - host: ${n8nIngressHost}
          paths:
            - path: /
              pathType: ImplementationSpecific
      tls:
        - secretName: n8n-tls
          hosts:
            -  ${n8nIngressHost}
