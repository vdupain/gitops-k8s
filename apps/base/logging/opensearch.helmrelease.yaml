apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opensearch
  namespace: logging
spec:
  releaseName: opensearch
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: opensearch
      version: 2.32.0
      sourceRef:
        kind: HelmRepository
        name: opensearch
        namespace: flux-system
      interval: 12h

  values:
    envFrom:
      - secretRef:
          name: opensearch-secret

    sysctlInit:
      enabled: true

    persistence:
      enabled: true
      size: 5Gi

    extraVolumes:
      - name: opensearch-prometheus-exporter-plugin
        configMap:
          name: opensearch-prometheus-exporter-plugin

    extraVolumeMounts:
      - name: opensearch-prometheus-exporter-plugin
        mountPath: /tmp/plugins
        readOnly: false

    plugins:
      enabled: true
      installList:
        - file:/tmp/plugins/prometheus-exporter-2.17.1.0-patched.zip

    serviceMonitor:
      enabled: false
