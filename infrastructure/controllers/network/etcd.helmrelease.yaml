---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: etcd
  namespace: etcd
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: etcd
      version: 0.2.0
      sourceRef:
        kind: HelmRepository
        name: cloudpirates
        namespace: flux-system
      interval: 12h
  releaseName: etcd

  values:
    config:
      logLevel: "info"
    persistence:
      enabled: false
