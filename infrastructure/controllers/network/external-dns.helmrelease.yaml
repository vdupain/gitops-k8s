---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: external-dns
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 12h
  releaseName: external-dns

  values:
    sources:
      - crd
      - service
      - ingress
    logLevel: debug
    policy: sync

    registry: "txt"
    txtPrefix: "external-dns-"
    txtOwnerId: "k8s"
    domainFilters:
      - ${externalDnsDomainFilter}
    provider:
      name: coredns
    env:
    - name: ETCD_URLS
      value: http://etcd.etcd.svc.cluster.local:2379
