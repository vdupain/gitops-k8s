---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: sealed-secrets
      version: 2.18.3
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: flux-system
      interval: 12h
  releaseName: sealed-secrets

  values:
    secretName: "sealed-secrets-bootstrap-key"
