---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  retryInterval: 1m
  timeout: 5m0s
  dependsOn:
    - name: infra-cnpg
  sourceRef:
    kind: GitRepository
    name: apps
  path: ./apps/clusters/staging
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: apps-vars
        optional: false
