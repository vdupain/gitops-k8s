apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  retryInterval: 1m
  dependsOn:
    - name: infra-security-config
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/clusters/gpu-cluster
  prune: true
  wait: true
  timeout: 5m0s
  